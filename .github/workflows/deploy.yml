name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cbs-backend
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  SERVICE_NAME: cbs-backend
  CONTAINER_NAME: cbs-backend
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::874962955168:role/github-actions-cbs-backend
          aws-region: ${{ env.AWS_REGION }}

      - name: Install lightsailctl
        run: |
          set -euxo pipefail
          sudo curl -fL "https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl" -o /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl
          ls -l /usr/local/bin/lightsailctl
          which lightsailctl
          file /usr/local/bin/lightsailctl || true
          # lightsailctl has no --version flag; just invoking it should print usage and exit non-zero, which is fine
          lightsailctl || true

      - name: Verify AWS identity and Lightsail access
        run: |
          set -euxo pipefail
          aws sts get-caller-identity
          aws lightsail get-container-services --region ${{ env.AWS_REGION }} --service-name ${{ env.SERVICE_NAME }} --query 'containerServices[0].state' --output text

      - name: Build Docker image
        run: |
          set -euxo pipefail
          docker build -t ${{ env.CONTAINER_NAME }}:${{ env.IMAGE_TAG }} .
          docker images | head -5

      - name: Push image to Lightsail
        id: push
        run: |
          set -euo pipefail
          # Stream output to console AND capture to file (tee). No command substitution swallowing.
          aws lightsail push-container-image \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --label ${{ env.CONTAINER_NAME }} \
            --image ${{ env.CONTAINER_NAME }}:${{ env.IMAGE_TAG }} 2>&1 | tee push.log
          IMAGE_REF=$(grep -oP 'Refer to this image as "\K[^"]+' push.log || true)
          if [ -z "$IMAGE_REF" ]; then
            echo "::error::Failed to extract image reference from push output. See push.log above."
            exit 1
          fi
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Pushed image: $IMAGE_REF"

      - name: Render deployment spec
        env:
          IMAGE_REF: ${{ steps.push.outputs.image_ref }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY_ID_APP: ${{ secrets.APP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_APP: ${{ secrets.APP_AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          CURRENCY_API_KEY: ${{ secrets.CURRENCY_API_KEY }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          COMPANY_NETWORK_IP_RANGES: ${{ vars.COMPANY_NETWORK_IP_RANGES }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME }}
          EMAIL_FROM_ADDRESS: ${{ vars.EMAIL_FROM_ADDRESS }}
          AWS_REGION_APP: ${{ vars.APP_AWS_REGION }}
        run: |
          cat > deployment.json <<EOF
          {
            "containers": {
              "$CONTAINER_NAME": {
                "image": "$IMAGE_REF",
                "ports": { "4000": "HTTP" },
                "environment": {
                  "NODE_ENV": "production",
                  "PORT": "4000",
                  "MONGO_URI": "$MONGO_URI",
                  "JWT_SECRET": "$JWT_SECRET",
                  "JWT_EXPIRES_IN": "24h",
                  "AWS_ACCESS_KEY_ID": "$AWS_ACCESS_KEY_ID_APP",
                  "AWS_SECRET_ACCESS_KEY": "$AWS_SECRET_ACCESS_KEY_APP",
                  "AWS_REGION": "$AWS_REGION_APP",
                  "S3_BUCKET_NAME": "$S3_BUCKET_NAME",
                  "S3_URL_EXPIRY": "900",
                  "CORS_ALLOWED_ORIGINS": "$CORS_ALLOWED_ORIGINS",
                  "EMAIL_HOST": "smtp.gmail.com",
                  "EMAIL_PORT": "587",
                  "EMAIL_SECURE": "false",
                  "EMAIL_USER": "$EMAIL_USER",
                  "EMAIL_PASSWORD": "$EMAIL_PASSWORD",
                  "EMAIL_FROM_NAME": "$EMAIL_FROM_NAME",
                  "EMAIL_FROM_ADDRESS": "$EMAIL_FROM_ADDRESS",
                  "COMPANY_NETWORK_IP_RANGES": "$COMPANY_NETWORK_IP_RANGES",
                  "CURRENCY_API_KEY": "$CURRENCY_API_KEY",
                  "CURRENCY_API_BASE_URL": "https://v6.exchangerate-api.com/v6"
                }
              }
            },
            "publicEndpoint": {
              "containerName": "$CONTAINER_NAME",
              "containerPort": 4000,
              "healthCheck": {
                "path": "/health",
                "successCodes": "200-299",
                "intervalSeconds": 10,
                "timeoutSeconds": 5,
                "healthyThreshold": 2,
                "unhealthyThreshold": 3
              }
            }
          }
          EOF

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --cli-input-json file://deployment.json

      - name: Wait for deployment to become ACTIVE
        run: |
          for i in {1..60}; do
            STATE=$(aws lightsail get-container-service-deployments \
              --region ${{ env.AWS_REGION }} \
              --service-name ${{ env.SERVICE_NAME }} \
              --query 'deployments[0].state' --output text)
            echo "Attempt $i — deployment state: $STATE"
            if [ "$STATE" = "ACTIVE" ]; then
              echo "Deployment is ACTIVE."
              exit 0
            fi
            if [ "$STATE" = "FAILED" ]; then
              echo "Deployment FAILED."
              aws lightsail get-container-log \
                --region ${{ env.AWS_REGION }} \
                --service-name ${{ env.SERVICE_NAME }} \
                --container-name ${{ env.CONTAINER_NAME }} \
                --start-time $(date -u -d '5 minutes ago' +%s) || true
              exit 1
            fi
            sleep 15
          done
          echo "Timed out waiting for deployment to become ACTIVE."
          exit 1

      - name: Print service URL
        run: |
          URL=$(aws lightsail get-container-services \
            --region ${{ env.AWS_REGION }} \
            --service-name ${{ env.SERVICE_NAME }} \
            --query 'containerServices[0].url' --output text)
          echo "Service URL: $URL"
          echo "Health check: ${URL}health"
